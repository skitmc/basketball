<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Basketball Playbook Pro</title>
    <style>
        :root {
            --primary: #ff6600;
            --primary-hover: #e65c00;
            --bg: #0f172a;
            --sidebar: #1e293b;
            --text: #f8fafc;
            --border: #334155;
        }

        body {
            font-family: 'Inter', -apple-system, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        /* Sidebar Styling */
        aside {
            width: 320px;
            background: var(--sidebar);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            padding: 24px;
            gap: 20px;
            box-shadow: 4px 0 15px rgba(0,0,0,0.3);
            z-index: 10;
        }

        h1 {
            font-size: 22px;
            margin: 0;
            color: var(--primary);
            text-transform: uppercase;
            letter-spacing: 1px;
            border-bottom: 2px solid var(--primary);
            padding-bottom: 10px;
        }

        .section-label {
            font-size: 12px;
            font-weight: 700;
            color: #94a3b8;
            text-transform: uppercase;
            margin-bottom: 8px;
        }

        .control-group {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        /* Tool Buttons */
        .tool-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }

        button {
            padding: 12px;
            border-radius: 8px;
            border: 1px solid var(--border);
            background: #334155;
            color: white;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }

        button:hover {
            background: #475569;
        }

        button.active {
            background: var(--primary);
            border-color: var(--primary);
        }

        /* Inputs */
        input[type="text"], input[type="color"] {
            width: 100%;
            padding: 12px;
            border-radius: 8px;
            border: 1px solid var(--border);
            background: #0f172a;
            color: white;
            box-sizing: border-box;
        }

        input[type="color"] {
            height: 50px;
            padding: 5px;
            cursor: pointer;
        }

        .save-btn {
            background: var(--primary);
            border: none;
            margin-top: auto;
            padding: 16px;
            font-size: 16px;
        }

        .save-btn:hover { background: var(--primary-hover); }

        .clear-btn {
            background: #ef4444;
            border: none;
        }

        .clear-btn:hover { background: #dc2626; }

        /* Main Workspace */
        main {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px;
            position: relative;
        }

        canvas {
            background-color: #fff;
            border-radius: 12px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            cursor: crosshair;
        }
    </style>
</head>
<body>

    <aside>
        <h1>Basketball Playbook</h1>
        
        <div class="control-group">
            <span class="section-label">Select Color</span>
            <input type="color" id="colorPicker" value="#ff6600">
        </div>

        <div class="control-group">
            <span class="section-label">Tools</span>
            <div class="tool-grid">
                <button id="drawBtn" class="active">Draw</button>
                <button id="textBtn">Text Bar</button>
            </div>
        </div>

        <div id="textSettings" class="control-group" style="display: none;">
            <span class="section-label">Text Content</span>
            <input type="text" id="textInput" placeholder="Enter Label (e.g. PG)">
            <p style="font-size: 11px; color: #94a3b8;">Click on court to place text</p>
        </div>

        <div class="control-group">
            <span class="section-label">File Management</span>
            <input type="text" id="filenameInput" placeholder="Filename (e.g. Pick-n-Roll)">
            <button id="clearBtn" class="clear-btn">Clear Court</button>
        </div>

        <button id="saveBtn" class="save-btn">Download Play (.PNG)</button>
    </aside>

    <main>
        <canvas id="courtCanvas" width="900" height="600"></canvas>
    </main>

    <script>
        const canvas = document.getElementById('courtCanvas');
        const ctx = canvas.getContext('2d');
        const colorPicker = document.getElementById('colorPicker');
        const textInput = document.getElementById('textInput');
        const filenameInput = document.getElementById('filenameInput');
        const textSettings = document.getElementById('textSettings');
        
        const drawBtn = document.getElementById('drawBtn');
        const textBtn = document.getElementById('textBtn');
        const clearBtn = document.getElementById('clearBtn');
        const saveBtn = document.getElementById('saveBtn');

        let isDrawing = false;
        let currentTool = 'draw';

        // Load background
        const bg = new Image();
        bg.src = 'assets/background.png';
        bg.onload = () => { resetCanvas(); };

        function resetCanvas() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            // Draw background image
            ctx.drawImage(bg, 0, 0, canvas.width, canvas.height);
        }

        // Tool Switching
        drawBtn.onclick = () => {
            currentTool = 'draw';
            drawBtn.classList.add('active');
            textBtn.classList.remove('active');
            textSettings.style.display = 'none';
        };

        textBtn.onclick = () => {
            currentTool = 'text';
            textBtn.classList.add('active');
            drawBtn.classList.remove('active');
            textSettings.style.display = 'flex';
        };

        clearBtn.onclick = () => {
            if(confirm("Wipe the court clean?")) resetCanvas();
        };

        // Canvas Interaction
        canvas.onmousedown = (e) => {
            const { x, y } = getMousePos(e);

            if (currentTool === 'draw') {
                isDrawing = true;
                ctx.beginPath();
                ctx.moveTo(x, y);
                ctx.strokeStyle = colorPicker.value;
                ctx.lineWidth = 5;
                ctx.lineCap = 'round';
                ctx.lineJoin = 'round';
            } else {
                const txt = textInput.value || "X";
                ctx.fillStyle = colorPicker.value;
                ctx.font = "bold 24px Inter, Arial";
                ctx.textAlign = "center";
                ctx.fillText(txt, x, y);
            }
        };

        canvas.onmousemove = (e) => {
            if (!isDrawing || currentTool !== 'draw') return;
            const { x, y } = getMousePos(e);
            ctx.lineTo(x, y);
            ctx.stroke();
        };

        canvas.onmouseup = () => isDrawing = false;
        canvas.onmouseout = () => isDrawing = false;

        function getMousePos(e) {
            const rect = canvas.getBoundingClientRect();
            return {
                x: (e.clientX - rect.left) * (canvas.width / rect.width),
                y: (e.clientY - rect.top) * (canvas.height / rect.height)
            };
        }

        // Save Logic
        saveBtn.onclick = () => {
            const name = filenameInput.value.trim() || "my-basketball-play";
            const link = document.createElement('a');
            link.download = `${name}.png`;
            link.href = canvas.toDataURL("image/png");
            link.click();
        };
    </script>
</body>
</html>
