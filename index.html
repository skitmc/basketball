<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Buzz City Playbook Pro | Final Edition</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/fabric.js/5.3.1/fabric.min.js"></script>
    <style>
        :root {
            --teal: #00788C;
            --purple: #1D1160;
            --dark: #0b0e14;
            --sidebar-bg: #161b22;
            --panel: #21262d;
            --border: #30363d;
            --text: #f0f6fc;
            --transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--dark);
            color: var(--text);
            margin: 0;
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        /* --- SIDEBAR --- */
        aside {
            width: 340px;
            background: var(--sidebar-bg);
            border-right: 2px solid var(--teal);
            display: flex;
            flex-direction: column;
            transition: transform var(--transition), margin-left var(--transition);
            z-index: 100;
            box-shadow: 10px 0 30px rgba(0,0,0,0.5);
        }

        body.sidebar-closed aside {
            transform: translateX(-100%);
            margin-left: -340px;
        }

        .sidebar-header {
            padding: 20px;
            text-align: center;
            background: linear-gradient(to bottom, var(--purple), transparent);
        }

        h1 { font-size: 1.2rem; color: var(--teal); text-transform: uppercase; letter-spacing: 2px; margin: 0; }

        .scroll-area { flex: 1; overflow-y: auto; padding: 15px; }

        details {
            background: var(--panel);
            border: 1px solid var(--border);
            border-radius: 12px;
            margin-bottom: 12px;
            overflow: hidden;
        }

        summary { padding: 12px; font-weight: 700; cursor: pointer; color: var(--teal); list-style: none; }
        details[open] summary { background: var(--purple); color: white; }

        .content { padding: 15px; display: flex; flex-direction: column; gap: 10px; }

        /* --- TOOLS --- */
        .tool-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }

        button {
            padding: 10px;
            border-radius: 8px;
            border: 1px solid var(--border);
            background: #30363d;
            color: white;
            font-weight: 600;
            cursor: pointer;
            transition: 0.2s;
            font-size: 12px;
        }

        button:hover { border-color: var(--teal); background: #3c444d; }
        button.active { background: var(--teal); border-color: white; box-shadow: 0 0 10px rgba(0,120,140,0.5); }
        
        #colorHistory { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 10px; }
        .swatch { width: 25px; height: 25px; border-radius: 4px; border: 1px solid white; cursor: pointer; }

        /* --- MAIN AREA --- */
        main {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            position: relative;
            background: radial-gradient(circle, #1a1f26 0%, #0b0e14 100%);
        }

        .canvas-card {
            background: white;
            padding: 8px;
            border-radius: 16px;
            border: 4px solid var(--teal);
            box-shadow: 0 25px 50px rgba(0,0,0,0.8);
        }

        /* --- HUD --- */
        .hud {
            position: absolute;
            top: 20px;
            display: flex;
            gap: 12px;
            z-index: 10;
        }

        .hud-btn {
            background: rgba(22, 27, 34, 0.9);
            backdrop-filter: blur(8px);
            border: 1px solid var(--border);
            padding: 10px 20px;
            border-radius: 30px;
            color: white;
            font-weight: bold;
            cursor: pointer;
        }

        #sidebarToggle {
            position: fixed;
            left: 20px;
            bottom: 20px;
            z-index: 1000;
            background: var(--teal);
            width: 50px;
            height: 50px;
            border-radius: 50%;
            border: none;
            color: white;
            font-size: 20px;
            cursor: pointer;
            box-shadow: 0 5px 15px rgba(0,0,0,0.4);
        }

        input[type="text"] {
            padding: 10px;
            background: #0d1117;
            border: 1px solid var(--border);
            color: white;
            border-radius: 6px;
        }
    </style>
</head>
<body>

    <button id="sidebarToggle">☰</button>

    <div class="hud">
        <button onclick="deleteSelected()" class="hud-btn" style="color: #ff4d4d;">🗑 DELETE SELECTED</button>
        <button onclick="clearCanvas()" class="hud-btn">🧹 CLEAR COURT</button>
        <button onclick="document.getElementById('fileUpload').click()" class="hud-btn" style="color: var(--teal);">📤 UPLOAD PLAY</button>
    </div>

    <input type="file" id="fileUpload" style="display:none;" accept="image/*">

    <aside id="sidebar">
        <div class="sidebar-header"><h1>BUZZ CITY PRO</h1></div>
        
        <div class="scroll-area">
            <details open>
                <summary>🎨 COLORS & HISTORY</summary>
                <div class="content">
                    <input type="color" id="colorPicker" value="#00788C" style="width:100%; height:45px; border:none; cursor:pointer;">
                    <div id="colorHistory"></div>
                </div>
            </details>

            <details open>
                <summary>🖱️ INTERACTION</summary>
                <div class="content">
                    <button class="tool active" data-tool="select">SELECT / MOVE MODE</button>
                    <p style="font-size:11px; color:#8b949e;">Select a shape to move it or change its color instantly.</p>
                </div>
            </details>

            <details open>
                <summary>📐 TACTICAL SHAPES</summary>
                <div class="content">
                    <div class="tool-grid">
                        <button class="tool" data-tool="dot">PLAYER DOT</button>
                        <button class="tool" data-tool="circle">ZONE CIRCLE</button>
                        <button class="tool" data-tool="square">BOX</button>
                        <button class="tool" data-tool="arrow">ARROW</button>
                        <button class="tool" data-tool="x-mark">X MARK</button>
                        <button class="tool" data-tool="star">STAR</button>
                        <button class="tool" data-tool="heart">HEART</button>
                    </div>
                </div>
            </details>

            <details>
                <summary>📝 ANNOTATIONS</summary>
                <div class="content">
                    <input type="text" id="textInput" placeholder="Label (PG, SG, etc)">
                    <button class="tool" data-tool="text">PLACE TEXT</button>
                </div>
            </details>

            <div style="margin-top: auto; padding-top: 20px;">
                <input type="text" id="filenameInput" placeholder="Save as..." style="width:100%; margin-bottom:10px;">
                <button onclick="exportPNG()" style="width:100%; background: var(--teal); padding:15px; font-size:16px;">💾 DOWNLOAD PLAY</button>
            </div>
        </div>
    </aside>

    <main>
        <div class="canvas-card">
            <canvas id="mainCanvas" width="900" height="600"></canvas>
        </div>
    </main>

    <script>
        // Setup Fabric Engine
        const canvas = new fabric.Canvas('mainCanvas', { preserveObjectStacking: true });
        const colorPicker = document.getElementById('colorPicker');
        const historyContainer = document.getElementById('colorHistory');
        const textInput = document.getElementById('textInput');
        let currentTool = 'select';
        let usedColors = new Set();

        // 1. Load Background
        function setBg(url) {
            fabric.Image.fromURL(url, function(img) {
                canvas.setBackgroundImage(img, canvas.renderAll.bind(canvas), {
                    scaleX: canvas.width / img.width,
                    scaleY: canvas.height / img.height
                });
            });
        }
        setBg('assets/background.png');

        // 2. Shape Creation Logic
        canvas.on('mouse:down', function(opt) {
            if (currentTool === 'select') return;
            const ptr = canvas.getPointer(opt.e);
            const color = colorPicker.value;
            let obj;

            switch(currentTool) {
                case 'dot': obj = new fabric.Circle({ radius: 12, fill: color, left: ptr.x, top: ptr.y, originX: 'center', originY: 'center' }); break;
                case 'circle': obj = new fabric.Circle({ radius: 40, fill: 'transparent', stroke: color, strokeWidth: 4, left: ptr.x, top: ptr.y, originX: 'center', originY: 'center' }); break;
                case 'square': obj = new fabric.Rect({ width: 60, height: 60, fill: 'transparent', stroke: color, strokeWidth: 4, left: ptr.x, top: ptr.y, originX: 'center', originY: 'center' }); break;
                case 'x-mark': obj = new fabric.Text('X', { fontSize: 45, fill: color, fontWeight: 'bold', left: ptr.x, top: ptr.y, originX: 'center', originY: 'center' }); break;
                case 'text': obj = new fabric.Text(textInput.value || 'P', { fontSize: 26, fill: color, fontWeight: 'bold', left: ptr.x, top: ptr.y, originX: 'center', originY: 'center' }); break;
                case 'star': obj = new fabric.Path('M 0 -20 L 5 -7 L 19 -7 L 8 2 L 12 15 L 0 7 L -12 15 L -8 2 L -19 -7 L -5 -7 Z', { fill: color, left: ptr.x, top: ptr.y, scaleX: 2.2, scaleY: 2.2, originX: 'center', originY: 'center' }); break;
                case 'heart': obj = new fabric.Path('M 0 10 C -10 -10 -20 0 -20 10 C -20 25 0 35 0 40 C 0 35 20 25 20 10 C 20 0 10 -10 0 10 Z', { fill: color, left: ptr.x, top: ptr.y, scaleX: 1.5, scaleY: 1.5, originX: 'center', originY: 'center', angle: 180 }); break;
                case 'arrow':
                    const line = new fabric.Line([0, 25, 0, -25], { stroke: color, strokeWidth: 5, originX: 'center', originY: 'center' });
                    const head = new fabric.Triangle({ width: 20, height: 20, fill: color, left: 0, top: -25, originX: 'center', originY: 'center' });
                    obj = new fabric.Group([line, head], { left: ptr.x, top: ptr.y, originX: 'center', originY: 'center' });
                    break;
            }

            if (obj) {
                canvas.add(obj);
                updateHistory(color);
                document.querySelector('[data-tool="select"]').click(); // Return to select mode
            }
        });

        // 3. Color History & Live Editing
        function updateHistory(color) {
            color = color.toUpperCase();
            if (!usedColors.has(color)) {
                usedColors.add(color);
                const sw = document.createElement('div');
                sw.className = 'swatch';
                sw.style.backgroundColor = color;
                sw.onclick = () => { colorPicker.value = color; applyColor(); };
                historyContainer.prepend(sw);
                if(historyContainer.children.length > 14) historyContainer.lastChild.remove();
            }
        }

        function applyColor() {
            const active = canvas.getActiveObject();
            if (active) {
                if (active.type === 'group') {
                    active.forEachObject(o => o.set(o.stroke && o.stroke !== 'transparent' ? 'stroke' : 'fill', colorPicker.value));
                } else {
                    active.set(active.stroke && active.fill === 'transparent' ? 'stroke' : 'fill', colorPicker.value);
                }
                canvas.renderAll();
            }
        }
        colorPicker.oninput = applyColor;

        // 4. Global Actions
        function deleteSelected() {
            canvas.getActiveObjects().forEach(o => canvas.remove(o));
            canvas.discardActiveObject().renderAll();
        }

        function clearCanvas() {
            if(confirm("Wipe the court?")) {
                canvas.getObjects().forEach(o => { if(o !== canvas.backgroundImage) canvas.remove(o); });
            }
        }

        function exportPNG() {
            const link = document.createElement('a');
            link.download = (document.getElementById('filenameInput').value || 'buzz-city-play') + '.png';
            link.href = canvas.toDataURL({ format: 'png', quality: 1 });
            link.click();
        }

        // 5. UI Toggles
        document.getElementById('sidebarToggle').onclick = () => document.body.classList.toggle('sidebar-closed');
        document.querySelectorAll('.tool').forEach(b => {
            b.onclick = () => {
                document.querySelectorAll('.tool').forEach(t => t.classList.remove('active'));
                b.classList.add('active');
                currentTool = b.dataset.tool;
                canvas.selection = (currentTool === 'select');
                canvas.forEachObject(o => o.selectable = (currentTool === 'select'));
            };
        });

        document.getElementById('fileUpload').onchange = (e) => {
            const reader = new FileReader();
            reader.onload = (f) => setBg(f.target.result);
            reader.readAsDataURL(e.target.files[0]);
        };

        window.addEventListener('keydown', (e) => {
            if ((e.key === "Delete" || e.key === "Backspace") && document.activeElement.tagName !== 'INPUT') deleteSelected();
        });
    </script>
</body>
</html>
