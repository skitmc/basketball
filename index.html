<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Basketball Playbook Pro | Buzz City</title>
    <style>
        :root {
            --teal: #00788C;
            --purple: #1D1160;
            --dark: #0b0e14;
            --sidebar-bg: #161b22;
            --panel: #21262d;
            --border: #30363d;
            --text: #f0f6fc;
            --transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        body {
            font-family: 'Inter', -apple-system, system-ui, sans-serif;
            background-color: var(--dark);
            color: var(--text);
            margin: 0;
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        /* --- SIDEBAR --- */
        aside {
            width: 340px;
            background: var(--sidebar-bg);
            border-right: 2px solid var(--teal);
            display: flex;
            flex-direction: column;
            transition: transform var(--transition), margin-left var(--transition);
            z-index: 100;
            box-shadow: 10px 0 30px rgba(0,0,0,0.5);
        }

        body.sidebar-closed aside {
            transform: translateX(-100%);
            margin-left: -340px;
        }

        .sidebar-header {
            padding: 25px;
            text-align: center;
            background: linear-gradient(to bottom, var(--purple), transparent);
        }

        h1 {
            font-size: 1.4rem;
            color: var(--teal);
            text-transform: uppercase;
            letter-spacing: 3px;
            margin: 0;
            text-shadow: 0 0 10px rgba(0, 120, 140, 0.5);
        }

        .scroll-area {
            flex: 1;
            overflow-y: auto;
            padding: 15px;
        }

        /* --- ACCORDIONS --- */
        details {
            background: var(--panel);
            border: 1px solid var(--border);
            border-radius: 12px;
            margin-bottom: 12px;
            overflow: hidden;
        }

        summary {
            padding: 14px;
            font-weight: 700;
            cursor: pointer;
            color: var(--teal);
            list-style: none;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: background 0.2s;
        }

        summary:hover { background: rgba(0, 120, 140, 0.1); }
        details[open] summary { background: var(--purple); color: white; }

        .content { padding: 15px; display: flex; flex-direction: column; gap: 12px; }

        /* --- TOOLS & UI --- */
        .tool-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }

        button {
            padding: 12px;
            border-radius: 8px;
            border: 1px solid var(--border);
            background: #30363d;
            color: white;
            font-weight: 600;
            cursor: pointer;
            transition: 0.2s;
            font-size: 13px;
        }

        button:hover { border-color: var(--teal); background: #3c444d; }
        button.active { background: var(--teal); color: white; border-color: white; box-shadow: 0 0 15px rgba(0, 120, 140, 0.4); }

        .swatch-grid { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 10px; }
        .swatch { width: 28px; height: 28px; border-radius: 6px; border: 2px solid transparent; cursor: pointer; transition: 0.2s; }
        .swatch:hover { transform: scale(1.1); border-color: white; }

        /* --- CANVAS --- */
        main {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            position: relative;
            background-image: 
                radial-gradient(circle at 2px 2px, rgba(255,255,255,0.05) 1px, transparent 0);
            background-size: 40px 40px;
        }

        .canvas-card {
            background: white;
            padding: 8px;
            border-radius: 16px;
            border: 4px solid var(--teal);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.7);
            position: relative;
        }

        canvas { border-radius: 8px; cursor: crosshair; display: block; }

        /* --- TOP HUD --- */
        .hud {
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 15px;
            z-index: 10;
        }

        .hud-btn {
            background: rgba(22, 27, 34, 0.8);
            backdrop-filter: blur(10px);
            border: 1px solid var(--border);
            padding: 10px 20px;
            border-radius: 30px;
            color: white;
            font-weight: bold;
        }

        .hud-btn:hover { background: var(--teal); border-color: white; }

        /* --- CONTROLS --- */
        #sidebarToggle {
            position: fixed;
            left: 20px;
            bottom: 20px;
            z-index: 1000;
            background: var(--teal);
            width: 50px;
            height: 50px;
            border-radius: 25px;
            border: none;
            color: white;
            font-size: 20px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.4);
        }

        input[type="text"] {
            padding: 12px;
            background: #0d1117;
            border: 1px solid var(--border);
            color: white;
            border-radius: 8px;
            outline: none;
        }

        input[type="text"]:focus { border-color: var(--teal); }

        .hidden-input { display: none; }
    </style>
</head>
<body>

    <button id="sidebarToggle">☰</button>

    <div class="hud">
        <button onclick="undo()" class="hud-btn">↩ UNDO</button>
        <button onclick="clearCanvas()" class="hud-btn" style="color: #ff4d4d;">🗑 CLEAR</button>
        <button onclick="document.getElementById('fileUpload').click()" class="hud-btn" style="color: var(--teal);">📤 UPLOAD PLAY</button>
    </div>

    <input type="file" id="fileUpload" class="hidden-input" accept="image/*">

    <aside id="sidebar">
        <div class="sidebar-header">
            <h1>BUZZ CITY PRO</h1>
        </div>

        <div class="scroll-area">
            <details open>
                <summary>🎨 PALETTE & HISTORY</summary>
                <div class="content">
                    <input type="color" id="colorPicker" value="#00788C" style="width:100%; height:50px; border-radius:8px; border:none; background:none; cursor:pointer;">
                    <div id="colorHistory" class="swatch-grid"></div>
                </div>
            </details>

            <details open>
                <summary>🖌️ PRIMARY TOOLS</summary>
                <div class="content">
                    <div class="tool-grid">
                        <button class="tool active" data-tool="pen">PEN</button>
                        <button class="tool" data-tool="dot">PLAYER DOT</button>
                    </div>
                    <input type="text" id="textInput" placeholder="Label (e.g. 'SCREEN')">
                    <button class="tool" data-tool="text">PLACE TEXT</button>
                </div>
            </details>

            <details>
                <summary>📐 TACTICAL SHAPES</summary>
                <div class="content">
                    <div class="tool-grid">
                        <button class="tool" data-tool="circle">CIRCLE</button>
                        <button class="tool" data-tool="square">SQUARE</button>
                        <button class="tool" data-tool="star">STAR</button>
                        <button class="tool" data-tool="heart">HEART</button>
                        <button class="tool" data-tool="x-mark">X MARK</button>
                        <button class="tool" data-tool="arrow">ARROW</button>
                    </div>
                </div>
            </details>

            <div style="margin-top: 20px;">
                <input type="text" id="filenameInput" placeholder="Filename..." style="width:100%; margin-bottom:10px;">
                <button onclick="saveImage()" style="width:100%; background: var(--teal); padding:15px; font-size:16px;">💾 DOWNLOAD PNG</button>
            </div>
        </div>
    </aside>

    <main>
        <div class="canvas-card">
            <canvas id="playCanvas" width="900" height="600"></canvas>
        </div>
    </main>

    <script>
        const canvas = document.getElementById('playCanvas');
        const ctx = canvas.getContext('2d');
        const colorPicker = document.getElementById('colorPicker');
        const historyContainer = document.getElementById('colorHistory');
        const fileUpload = document.getElementById('fileUpload');
        
        let isDrawing = false;
        let currentTool = 'pen';
        let startX, startY;
        let history = [];
        let usedColors = new Set();
        let snapshot; // Used for live preview of shapes

        const bg = new Image();
        bg.src = 'assets/background.png';
        bg.onload = () => { resetAndSave(); };

        function resetAndSave() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.drawImage(bg, 0, 0, canvas.width, canvas.height);
            saveState();
        }

        // --- CORE FUNCTIONS ---
        function saveState() {
            if (history.length > 25) history.shift();
            history.push(canvas.toDataURL());
            addColorHistory(colorPicker.value);
        }

        function undo() {
            if (history.length > 1) {
                history.pop();
                const img = new Image();
                img.src = history[history.length - 1];
                img.onload = () => {
                    ctx.clearRect(0, 0, canvas.width, canvas.height);
                    ctx.drawImage(img, 0, 0);
                };
            }
        }

        function clearCanvas() {
            if(confirm("Wipe the court?")) resetAndSave();
        }

        // --- UPLOAD LOGIC ---
        fileUpload.onchange = (e) => {
            const file = e.target.files[0];
            const reader = new FileReader();
            reader.onload = (event) => {
                const img = new Image();
                img.onload = () => {
                    ctx.clearRect(0, 0, canvas.width, canvas.height);
                    ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
                    saveState();
                };
                img.src = event.target.result;
            };
            reader.readAsDataURL(file);
        };

        // --- UI LOGIC ---
        document.getElementById('sidebarToggle').onclick = () => {
            document.body.classList.toggle('sidebar-closed');
        };

        document.querySelectorAll('.tool').forEach(btn => {
            btn.onclick = () => {
                document.querySelectorAll('.tool').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                currentTool = btn.dataset.tool;
            };
        });

        function addColorHistory(color) {
            color = color.toUpperCase();
            if (!usedColors.has(color)) {
                usedColors.add(color);
                const div = document.createElement('div');
                div.className = 'swatch';
                div.style.backgroundColor = color;
                div.onclick = () => colorPicker.value = color;
                historyContainer.prepend(div);
                if(historyContainer.children.length > 18) historyContainer.lastChild.remove();
            }
        }

        // --- DRAWING ENGINE ---
        function getPos(e) {
            const rect = canvas.getBoundingClientRect();
            return {
                x: (e.clientX - rect.left) * (canvas.width / rect.width),
                y: (e.clientY - rect.top) * (canvas.height / rect.height)
            };
        }

        canvas.onmousedown = (e) => {
            const pos = getPos(e);
            startX = pos.x; startY = pos.y;
            isDrawing = true;

            // Capture snapshot for preview
            snapshot = ctx.getImageData(0, 0, canvas.width, canvas.height);

            if (currentTool === 'pen') {
                ctx.beginPath();
                ctx.moveTo(startX, startY);
            }
        };

        canvas.onmousemove = (e) => {
            if (!isDrawing) return;
            const pos = getPos(e);

            if (currentTool === 'pen') {
                ctx.lineTo(pos.x, pos.y);
                ctx.strokeStyle = colorPicker.value;
                ctx.lineWidth = 4;
                ctx.lineCap = 'round';
                ctx.stroke();
            } else {
                // Real-time Preview for shapes
                ctx.putImageData(snapshot, 0, 0);
                drawShape(currentTool, startX, startY, pos.x, pos.y, false);
            }
        };

        canvas.onmouseup = (e) => {
            if (!isDrawing) return;
            const pos = getPos(e);
            
            if (currentTool !== 'pen') {
                ctx.putImageData(snapshot, 0, 0);
                drawShape(currentTool, startX, startY, pos.x, pos.y, true);
            }
            
            isDrawing = false;
            saveState();
        };

        function drawShape(tool, x1, y1, x2, y2, isFinal) {
            ctx.fillStyle = ctx.strokeStyle = colorPicker.value;
            ctx.lineWidth = 4;
            ctx.lineCap = 'round';
            ctx.lineJoin = 'round';

            const dist = Math.sqrt((x2-x1)**2 + (y2-y1)**2);

            switch(tool) {
                case 'dot': ctx.beginPath(); ctx.arc(x1, y1, 8, 0, Math.PI*2); ctx.fill(); break;
                case 'text': 
                    if(isFinal) {
                        ctx.font = "bold 24px Inter, Arial"; 
                        ctx.textAlign = "center"; 
                        ctx.fillText(document.getElementById('textInput').value || "P", x1, y1);
                    }
                    break;
                case 'circle': ctx.beginPath(); ctx.arc(x1, y1, dist, 0, Math.PI*2); ctx.stroke(); break;
                case 'square': ctx.strokeRect(x1, y1, x2-x1, y2-y1); break;
                case 'x-mark':
                    ctx.beginPath();
                    ctx.moveTo(x1-dist, y1-dist); ctx.lineTo(x1+dist, y1+dist);
                    ctx.moveTo(x1+dist, y1-dist); ctx.lineTo(x1-dist, y1+dist);
                    ctx.stroke();
                    break;
                case 'arrow':
                    const head = 15; const angle = Math.atan2(y2-y1, x2-x1);
                    ctx.beginPath(); ctx.moveTo(x1, y1); ctx.lineTo(x2, y2);
                    ctx.lineTo(x2-head*Math.cos(angle-Math.PI/6), y2-head*Math.sin(angle-Math.PI/6));
                    ctx.moveTo(x2, y2);
                    ctx.lineTo(x2-head*Math.cos(angle+Math.PI/6), y2-head*Math.sin(angle+Math.PI/6));
                    ctx.stroke();
                    break;
                case 'star':
                    drawStar(x1, y1, dist);
                    break;
                case 'heart':
                    drawHeart(x1, y1, dist);
                    break;
            }
        }

        function drawStar(x, y, r) {
            ctx.beginPath();
            for(let i=0; i<10; i++) {
                let angle = (i * Math.PI) / 5;
                let radius = i % 2 === 0 ? r : r/2;
                ctx.lineTo(x + radius * Math.cos(angle), y + radius * Math.sin(angle));
            }
            ctx.closePath(); ctx.stroke();
        }

        function drawHeart(x, y, size) {
            ctx.beginPath();
            ctx.moveTo(x, y + size/4);
            ctx.bezierCurveTo(x, y, x-size, y, x-size, y+size/2);
            ctx.bezierCurveTo(x-size, y+size, x, y+size*1.2, x, y+size*1.5);
            ctx.bezierCurveTo(x, y+size*1.2, x+size, y+size, x+size, y+size/2);
            ctx.bezierCurveTo(x+size, y, x, y, x, y+size/4);
            ctx.stroke();
        }

        function saveImage() {
            const name = document.getElementById('filenameInput').value || 'hornets-play';
            const link = document.createElement('a');
            link.download = name + '.png';
            link.href = canvas.toDataURL();
            link.click();
        }
    </script>
</body>
</html>
