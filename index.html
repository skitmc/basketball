<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hornets Playbook Pro</title>
    <style>
        :root {
            --hornets-teal: #00788C;
            --hornets-purple: #1d1160;
            --hornets-dark: #0b0e14;
            --sidebar-width: 320px;
            --transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        body {
            font-family: 'Segoe UI', Tahoma, sans-serif;
            background-color: var(--hornets-dark);
            color: white;
            margin: 0;
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        /* --- SIDEBAR LOGIC --- */
        aside {
            width: var(--sidebar-width);
            background: #161b22;
            border-right: 2px solid var(--hornets-teal);
            display: flex;
            flex-direction: column;
            padding: 20px;
            box-sizing: border-box;
            transition: transform var(--transition), margin-left var(--transition);
            z-index: 100;
            overflow-y: auto;
        }

        body.sidebar-closed aside {
            transform: translateX(-100%);
            margin-left: calc(var(--sidebar-width) * -1);
        }

        /* --- TOGGLE BUTTON --- */
        #sidebarToggle {
            position: fixed;
            left: 10px;
            top: 10px;
            z-index: 1000;
            background: var(--hornets-teal);
            color: white;
            border: none;
            padding: 10px;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
            box-shadow: 0 4px 10px rgba(0,0,0,0.5);
        }

        /* --- ACCORDIONS --- */
        details {
            background: #21262d;
            border: 1px solid #30363d;
            border-radius: 8px;
            margin-bottom: 10px;
        }

        summary {
            padding: 12px;
            font-weight: bold;
            cursor: pointer;
            color: var(--hornets-teal);
            list-style: none;
            outline: none;
        }

        details[open] summary {
            background: var(--hornets-purple);
            color: white;
            border-radius: 8px 8px 0 0;
        }

        .section-content {
            padding: 15px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        /* --- TOOLS & BUTTONS --- */
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }

        button {
            padding: 10px;
            border-radius: 6px;
            border: 1px solid #30363d;
            background: #30363d;
            color: white;
            cursor: pointer;
            font-weight: 600;
            transition: 0.2s;
        }

        button:hover { background: #484f58; }
        button.active { background: var(--hornets-teal); border-color: white; }

        #colorHistory { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 5px; }
        .swatch { width: 24px; height: 24px; border-radius: 4px; border: 1px solid white; cursor: pointer; }

        /* --- CANVAS AREA --- */
        main {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px;
            transition: padding var(--transition);
        }

        .canvas-container {
            position: relative;
            background: white;
            border: 4px solid #A1A1A4;
            border-radius: 12px;
            box-shadow: 0 0 50px rgba(0,0,0,0.8);
            line-height: 0;
        }

        canvas { cursor: crosshair; }

        /* --- INPUTS --- */
        input[type="text"] {
            padding: 10px;
            background: #0d1117;
            border: 1px solid #30363d;
            color: white;
            border-radius: 6px;
        }

        .action-group { margin-top: auto; display: flex; flex-direction: column; gap: 8px; }
        .save-btn { background: var(--hornets-teal); padding: 15px; }
        .undo-btn { background: var(--hornets-purple); }
    </style>
</head>
<body>

    <button id="sidebarToggle">☰ MENU</button>

    <aside id="sidebar">
        <h1 style="color: var(--hornets-teal); text-align:center; margin-top:40px;">Buzz City</h1>

        <details open>
            <summary>🎨 Colors & History</summary>
            <div class="section-content">
                <input type="color" id="colorPicker" value="#00788C" style="width:100%; height:40px; cursor:pointer; border:none; background:none;">
                <div id="colorHistory"></div>
            </div>
        </details>

        <details>
            <summary>🖌️ Player Tools</summary>
            <div class="section-content">
                <div class="grid">
                    <button class="tool active" data-tool="draw">Pen</button>
                    <button class="tool" data-tool="dot">Dot</button>
                </div>
                <input type="text" id="textInput" placeholder="Note (PG, SG...)">
                <button class="tool" data-tool="text">Add Text</button>
            </div>
        </details>

        <details>
            <summary>📐 Shapes</summary>
            <div class="section-content">
                <div class="grid">
                    <button class="tool" data-tool="circle">Circle</button>
                    <button class="tool" data-tool="square">Square</button>
                    <button class="tool" data-tool="star">Star</button>
                    <button class="tool" data-tool="heart">Heart</button>
                    <button class="tool" data-tool="x-mark">X Mark</button>
                    <button class="tool" data-tool="arrow">Arrow</button>
                </div>
            </div>
        </details>

        <div class="action-group">
            <button id="undoBtn" class="undo-btn">↩ Undo</button>
            <button id="clearBtn" style="background:#da3633;">🗑 Clear Court</button>
            <input type="text" id="filenameInput" placeholder="Save Name...">
            <button id="saveBtn" class="save-btn">💾 DOWNLOAD .PNG</button>
        </div>
    </aside>

    <main>
        <div class="canvas-container">
            <canvas id="courtCanvas" width="900" height="600"></canvas>
        </div>
    </main>

    <script>
        const canvas = document.getElementById('courtCanvas');
        const ctx = canvas.getContext('2d');
        const colorPicker = document.getElementById('colorPicker');
        const colorHistoryContainer = document.getElementById('colorHistory');
        const textInput = document.getElementById('textInput');
        const sidebarToggle = document.getElementById('sidebarToggle');
        
        let isDrawing = false;
        let currentTool = 'draw';
        let startX, startY;
        let history = [];
        let usedColors = new Set();

        // --- SIDEBAR TOGGLE ---
        sidebarToggle.onclick = () => {
            document.body.classList.toggle('sidebar-closed');
            sidebarToggle.innerText = document.body.classList.contains('sidebar-closed') ? '☰ OPEN TOOLS' : '☰ HIDE TOOLS';
        };

        // --- BACKGROUND ---
        const bg = new Image();
        bg.src = 'assets/background.png';
        bg.onload = () => { resetCanvas(); saveState(); };

        function resetCanvas() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.drawImage(bg, 0, 0, canvas.width, canvas.height);
        }

        // --- COLOR HISTORY ---
        function addColorToHistory(color) {
            color = color.toUpperCase();
            if (!usedColors.has(color)) {
                usedColors.add(color);
                const swatch = document.createElement('div');
                swatch.className = 'swatch';
                swatch.style.backgroundColor = color;
                swatch.onclick = () => colorPicker.value = color;
                colorHistoryContainer.prepend(swatch);
                if(colorHistoryContainer.children.length > 14) colorHistoryContainer.lastChild.remove();
            }
        }

        // --- UNDO ---
        function saveState() {
            if (history.length > 20) history.shift();
            history.push(canvas.toDataURL());
            addColorToHistory(colorPicker.value);
        }

        document.getElementById('undoBtn').onclick = () => {
            if (history.length > 1) {
                history.pop();
                let img = new Image();
                img.src = history[history.length - 1];
                img.onload = () => {
                    ctx.clearRect(0, 0, canvas.width, canvas.height);
                    ctx.drawImage(img, 0, 0);
                };
            }
        };

        // --- TOOL SELECT ---
        document.querySelectorAll('.tool').forEach(btn => {
            btn.onclick = () => {
                document.querySelectorAll('.tool').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                currentTool = btn.dataset.tool;
            };
        });

        // --- MOUSE LOGIC ---
        canvas.onmousedown = (e) => {
            const pos = getMousePos(e);
            startX = pos.x; startY = pos.y;
            isDrawing = true;
            if (currentTool === 'draw') {
                ctx.beginPath();
                ctx.moveTo(startX, startY);
            } else if (currentTool === 'dot') {
                drawDot(startX, startY);
                saveState();
                isDrawing = false;
            } else if (currentTool === 'text') {
                drawText(startX, startY);
                saveState();
                isDrawing = false;
            }
        };

        canvas.onmousemove = (e) => {
            if (!isDrawing || currentTool !== 'draw') return;
            const pos = getMousePos(e);
            ctx.lineTo(pos.x, pos.y);
            ctx.strokeStyle = colorPicker.value;
            ctx.lineWidth = 4;
            ctx.lineCap = 'round';
            ctx.stroke();
        };

        canvas.onmouseup = (e) => {
            if (!isDrawing) return;
            const pos = getMousePos(e);
            ctx.fillStyle = ctx.strokeStyle = colorPicker.value;
            ctx.lineWidth = 3;

            // Shape Logic (Smarter sizing)
            if (currentTool === 'circle') drawCircle(startX, startY, pos.x, pos.y);
            if (currentTool === 'square') drawSquare(startX, startY, pos.x, pos.y);
            if (currentTool === 'star') drawStar(startX, startY, pos.x, pos.y);
            if (currentTool === 'heart') drawHeart(startX, startY, pos.x, pos.y);
            if (currentTool === 'x-mark') drawX(startX, startY, pos.x, pos.y);
            if (currentTool === 'arrow') drawArrow(startX, startY, pos.x, pos.y);

            isDrawing = false;
            if (currentTool !== 'draw') saveState(); else saveState();
        };

        function getMousePos(e) {
            const rect = canvas.getBoundingClientRect();
            return {
                x: (e.clientX - rect.left) * (canvas.width / rect.width),
                y: (e.clientY - rect.top) * (canvas.height / rect.height)
            };
        }

        // --- SHAPE DRAWING ---
        function drawDot(x, y) { ctx.beginPath(); ctx.arc(x, y, 6, 0, Math.PI*2); ctx.fill(); }
        function drawText(x, y) { ctx.font = "bold 22px Arial"; ctx.textAlign = "center"; ctx.fillText(textInput.value || "X", x, y); }
        function drawSquare(x1, y1, x2, y2) { ctx.strokeRect(x1, y1, x2-x1, y2-y1); }
        function drawCircle(x1, y1, x2, y2) { let r = Math.sqrt((x2-x1)**2 + (y2-y1)**2); ctx.beginPath(); ctx.arc(x1, y1, r, 0, Math.PI*2); ctx.stroke(); }
        
        function drawStar(x, y, x2, y2) {
            let r = Math.sqrt((x2-x)**2 + (y2-y)**2);
            ctx.beginPath();
            for(let i=0; i<10; i++) {
                let angle = (i * Math.PI) / 5;
                let radius = i % 2 === 0 ? r : r/2;
                ctx.lineTo(x + radius * Math.cos(angle), y + radius * Math.sin(angle));
            }
            ctx.closePath(); ctx.stroke();
        }

        function drawHeart(x, y, x2, y2) {
            let size = Math.abs(x2 - x) || 20;
            ctx.beginPath();
            ctx.moveTo(x, y + size/4);
            ctx.bezierCurveTo(x, y, x-size, y, x-size, y+size/2);
            ctx.bezierCurveTo(x-size, y+size, x, y+size*1.2, x, y+size*1.5);
            ctx.bezierCurveTo(x, y+size*1.2, x+size, y+size, x+size, y+size/2);
            ctx.bezierCurveTo(x+size, y, x, y, x, y+size/4);
            ctx.stroke();
        }

        function drawX(x, y, x2, y2) {
            let s = Math.abs(x2 - x) || 15;
            ctx.beginPath();
            ctx.moveTo(x-s, y-s); ctx.lineTo(x+s, y+s);
            ctx.moveTo(x+s, y-s); ctx.lineTo(x-s, y+s);
            ctx.stroke();
        }

        function drawArrow(x1, y1, x2, y2) {
            const head = 12; const angle = Math.atan2(y2-y1, x2-x1);
            ctx.beginPath(); ctx.moveTo(x1, y1); ctx.lineTo(x2, y2);
            ctx.lineTo(x2-head*Math.cos(angle-Math.PI/6), y2-head*Math.sin(angle-Math.PI/6));
            ctx.moveTo(x2, y2);
            ctx.lineTo(x2-head*Math.cos(angle+Math.PI/6), y2-head*Math.sin(angle+Math.PI/6));
            ctx.stroke();
        }

        document.getElementById('clearBtn').onclick = () => { if(confirm("Wipe the court?")) { resetCanvas(); saveState(); } };
        document.getElementById('saveBtn').onclick = () => {
            const link = document.createElement('a');
            link.download = (document.getElementById('filenameInput').value || 'hornets-play') + '.png';
            link.href = canvas.toDataURL(); link.click();
        };
    </script>
</body>
</html>
