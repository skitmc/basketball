<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Buzz City Playbook Pro | Object Edition</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/fabric.js/5.3.1/fabric.min.js"></script>
    <style>
        :root {
            --teal: #00788C;
            --purple: #1D1160;
            --dark: #0b0e14;
            --sidebar-bg: #161b22;
            --panel: #21262d;
            --border: #30363d;
            --text: #f0f6fc;
            --transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--dark);
            color: var(--text);
            margin: 0;
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        /* --- SIDEBAR --- */
        aside {
            width: 340px;
            background: var(--sidebar-bg);
            border-right: 2px solid var(--teal);
            display: flex;
            flex-direction: column;
            transition: transform var(--transition), margin-left var(--transition);
            z-index: 100;
            box-shadow: 10px 0 30px rgba(0,0,0,0.5);
        }

        body.sidebar-closed aside {
            transform: translateX(-100%);
            margin-left: -340px;
        }

        .sidebar-header {
            padding: 20px;
            text-align: center;
            background: linear-gradient(to bottom, var(--purple), transparent);
        }

        h1 {
            font-size: 1.2rem;
            color: var(--teal);
            text-transform: uppercase;
            letter-spacing: 2px;
            margin: 0;
        }

        .scroll-area {
            flex: 1;
            overflow-y: auto;
            padding: 15px;
        }

        details {
            background: var(--panel);
            border: 1px solid var(--border);
            border-radius: 12px;
            margin-bottom: 12px;
            overflow: hidden;
        }

        summary {
            padding: 12px;
            font-weight: 700;
            cursor: pointer;
            color: var(--teal);
            list-style: none;
        }

        .content { padding: 15px; display: flex; flex-direction: column; gap: 10px; }

        /* --- TOOLS --- */
        .tool-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }

        button {
            padding: 10px;
            border-radius: 8px;
            border: 1px solid var(--border);
            background: #30363d;
            color: white;
            font-weight: 600;
            cursor: pointer;
            transition: 0.2s;
        }

        button:hover { border-color: var(--teal); }
        button.active { background: var(--teal); border-color: white; }
        
        .delete-btn { background: #da3633; border: none; margin-top: 10px; }
        .delete-btn:hover { background: #ff4d4d; }

        /* --- MAIN AREA --- */
        main {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        .canvas-container-outer {
            background: white;
            padding: 5px;
            border-radius: 12px;
            border: 4px solid var(--teal);
            box-shadow: 0 20px 40px rgba(0,0,0,0.6);
        }

        #sidebarToggle {
            position: fixed;
            left: 20px;
            bottom: 20px;
            z-index: 1000;
            background: var(--teal);
            width: 45px;
            height: 45px;
            border-radius: 50%;
            border: none;
            color: white;
            cursor: pointer;
        }

        .hud {
            position: absolute;
            top: 20px;
            display: flex;
            gap: 10px;
        }

        .hud-btn {
            background: rgba(22, 27, 34, 0.9);
            border: 1px solid var(--border);
            padding: 8px 15px;
            border-radius: 20px;
            color: white;
            font-size: 12px;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <button id="sidebarToggle">☰</button>

    <div class="hud">
        <button onclick="deleteSelected()" class="hud-btn" style="color:#ff4d4d">DELETE SELECTED</button>
        <button onclick="clearCanvas()" class="hud-btn">CLEAR ALL</button>
        <button onclick="document.getElementById('fileUpload').click()" class="hud-btn" style="color:var(--teal)">UPLOAD BASE</button>
    </div>

    <input type="file" id="fileUpload" style="display:none" accept="image/*">

    <aside id="sidebar">
        <div class="sidebar-header"><h1>BUZZ CITY ELITE</h1></div>
        <div class="scroll-area">
            
            <details open>
                <summary>🎨 STYLE & COLOR</summary>
                <div class="content">
                    <input type="color" id="colorPicker" value="#00788C" style="width:100%; height:40px; cursor:pointer; border-radius:5px; border:none; background:none;">
                </div>
            </details>

            <details open>
                <summary>🕹️ INTERACTION</summary>
                <div class="content">
                    <button class="tool active" data-tool="select">SELECT / MOVE</button>
                    <p style="font-size: 11px; color: #8b949e;">Click an object on the court to move, resize, or change its color.</p>
                </div>
            </details>

            <details open>
                <summary>📐 ADD OBJECTS</summary>
                <div class="content">
                    <div class="tool-grid">
                        <button class="tool" data-tool="dot">PLAYER</button>
                        <button class="tool" data-tool="circle">ZONE</button>
                        <button class="tool" data-tool="square">BOX</button>
                        <button class="tool" data-tool="arrow">ARROW</button>
                        <button class="tool" data-tool="x-mark">X MARK</button>
                        <button class="tool" data-tool="star">STAR</button>
                    </div>
                    <hr style="border:0; border-top:1px solid var(--border); margin:5px 0;">
                    <input type="text" id="textInput" placeholder="Note (e.g. 'SCREEN')">
                    <button class="tool" data-tool="text">ADD TEXT</button>
                </div>
            </details>

            <div style="margin-top:20px;">
                <button onclick="exportPNG()" style="width:100%; background:var(--teal); padding:15px;">💾 DOWNLOAD PNG</button>
            </div>
        </div>
    </aside>

    <main>
        <div class="canvas-container-outer">
            <canvas id="mainCanvas" width="900" height="600"></canvas>
        </div>
    </main>

    <script>
        // Initialize Fabric Canvas
        const canvas = new fabric.Canvas('mainCanvas', {
            preserveObjectStacking: true
        });

        const colorPicker = document.getElementById('colorPicker');
        const textInput = document.getElementById('textInput');
        let currentTool = 'select';

        // 1. Set Background Court
        function setBackground(url) {
            fabric.Image.fromURL(url, function(img) {
                canvas.setBackgroundImage(img, canvas.renderAll.bind(canvas), {
                    scaleX: canvas.width / img.width,
                    scaleY: canvas.height / img.height
                });
            });
        }
        setBackground('assets/background.png');

        // 2. Tool Logic
        document.querySelectorAll('.tool').forEach(btn => {
            btn.onclick = () => {
                document.querySelectorAll('.tool').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                currentTool = btn.dataset.tool;
                
                // Disable/Enable selection based on tool
                canvas.selection = (currentTool === 'select');
                canvas.forEachObject(obj => obj.selectable = (currentTool === 'select'));
            };
        });

        // 3. Adding Objects via Click
        canvas.on('mouse:down', function(options) {
            if (currentTool === 'select') return;
            
            const pointer = canvas.getPointer(options.e);
            const color = colorPicker.value;
            let obj;

            switch(currentTool) {
                case 'dot':
                    obj = new fabric.Circle({ radius: 12, fill: color, left: pointer.x, top: pointer.y, originX: 'center', originY: 'center' });
                    break;
                case 'circle':
                    obj = new fabric.Circle({ radius: 40, fill: 'transparent', stroke: color, strokeWidth: 4, left: pointer.x, top: pointer.y, originX: 'center', originY: 'center' });
                    break;
                case 'square':
                    obj = new fabric.Rect({ width: 60, height: 60, fill: 'transparent', stroke: color, strokeWidth: 4, left: pointer.x, top: pointer.y, originX: 'center', originY: 'center' });
                    break;
                case 'x-mark':
                    obj = new fabric.Text('X', { fontSize: 40, fill: color, fontWeight: 'bold', left: pointer.x, top: pointer.y, originX: 'center', originY: 'center' });
                    break;
                case 'text':
                    obj = new fabric.Text(textInput.value || 'PLAY', { fontSize: 24, fill: color, fontWeight: 'bold', left: pointer.x, top: pointer.y, originX: 'center', originY: 'center' });
                    break;
                case 'star':
                    obj = new fabric.Path('M 0 -20 L 5 -7 L 19 -7 L 8 2 L 12 15 L 0 7 L -12 15 L -8 2 L -19 -7 L -5 -7 Z', { fill: color, left: pointer.x, top: pointer.y, scaleX: 2, scaleY: 2, originX: 'center', originY: 'center' });
                    break;
                case 'arrow':
                    const line = new fabric.Line([0, 20, 0, -20], { stroke: color, strokeWidth: 4, originX: 'center', originY: 'center' });
                    const head = new fabric.Triangle({ width: 15, height: 15, fill: color, left: 0, top: -20, originX: 'center', originY: 'center' });
                    obj = new fabric.Group([line, head], { left: pointer.x, top: pointer.y, originX: 'center', originY: 'center' });
                    break;
            }

            if (obj) {
                canvas.add(obj);
                canvas.setActiveObject(obj);
                // Return to select tool after placing
                document.querySelector('[data-tool="select"]').click();
            }
        });

        // 4. Live Color Update
        colorPicker.oninput = () => {
            const active = canvas.getActiveObject();
            if (active) {
                if (active.type === 'group') {
                    active.forEachObject(o => {
                        if (o.stroke && o.stroke !== 'transparent') o.set('stroke', colorPicker.value);
                        else o.set('fill', colorPicker.value);
                    });
                } else {
                    if (active.stroke && active.fill === 'transparent') active.set('stroke', colorPicker.value);
                    else active.set('fill', colorPicker.value);
                }
                canvas.renderAll();
            }
        };

        // 5. Global Functions
        function deleteSelected() {
            canvas.getActiveObjects().forEach(obj => canvas.remove(obj));
            canvas.discardActiveObject().renderAll();
        }

        function clearCanvas() {
            if(confirm("Delete all objects?")) {
                canvas.getObjects().forEach(obj => {
                    if (obj !== canvas.backgroundImage) canvas.remove(obj);
                });
            }
        }

        function exportPNG() {
            const dataURL = canvas.toDataURL({ format: 'png', quality: 1 });
            const link = document.createElement('a');
            link.download = 'buzz-city-play.png';
            link.href = dataURL;
            link.click();
        }

        // 6. Keyboard Delete
        window.addEventListener('keydown', (e) => {
            if (e.key === "Delete" || e.key === "Backspace") {
                if (document.activeElement.tagName !== 'INPUT') deleteSelected();
            }
        });

        // 7. Sidebar Toggle
        document.getElementById('sidebarToggle').onclick = () => document.body.classList.toggle('sidebar-closed');

        // 8. Base Image Upload
        document.getElementById('fileUpload').onchange = (e) => {
            const reader = new FileReader();
            reader.onload = (f) => setBackground(f.target.result);
            reader.readAsDataURL(e.target.files[0]);
        };
    </script>
</body>
</html>
