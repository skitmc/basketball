<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hornets Playbook Pro</title>
    <style>
        :root {
            --hornets-teal: #00788C;
            --hornets-purple: #1d1160;
            --hornets-dark: #002B5C;
            --hornets-silver: #A1A1A4;
            --bg: #0b0e14;
            --sidebar-bg: #161b22;
            --text: #f0f6fc;
            --border: #30363d;
        }

        body {
            font-family: 'Segoe UI', Roboto, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        /* Sidebar & Accordions */
        aside {
            width: 320px;
            background: var(--sidebar-bg);
            border-right: 2px solid var(--hornets-teal);
            display: flex;
            flex-direction: column;
            padding: 15px;
            gap: 10px;
            overflow-y: auto;
            box-shadow: 5px 0 15px rgba(0,0,0,0.5);
        }

        h1 {
            color: var(--hornets-teal);
            font-size: 22px;
            text-align: center;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin: 10px 0;
            text-shadow: 2px 2px var(--hornets-purple);
        }

        details {
            background: #21262d;
            border: 1px solid var(--border);
            border-radius: 6px;
            margin-bottom: 5px;
        }

        summary {
            padding: 12px;
            font-weight: bold;
            cursor: pointer;
            list-style: none;
            color: var(--hornets-teal);
            border-bottom: 1px solid transparent;
            transition: 0.2s;
        }

        details[open] summary {
            border-bottom: 1px solid var(--border);
            background: var(--hornets-purple);
            color: white;
        }

        .section-content {
            padding: 15px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        /* Buttons & Tools */
        .grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
        }

        button {
            padding: 10px;
            border-radius: 4px;
            border: 1px solid var(--border);
            background: #30363d;
            color: white;
            cursor: pointer;
            font-weight: 600;
            transition: 0.2s;
        }

        button:hover { background: #484f58; }
        button.active { background: var(--hornets-teal); border-color: white; }

        /* Color History Swatches */
        #colorHistory {
            display: flex;
            flex-wrap: wrap;
            gap: 5px;
            margin-top: 5px;
        }

        .swatch {
            width: 25px;
            height: 25px;
            border-radius: 4px;
            border: 1px solid white;
            cursor: pointer;
        }

        /* Canvas Area */
        main {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            background: radial-gradient(circle, #1d1160 0%, #0b0e14 100%);
            padding: 20px;
        }

        .canvas-wrapper {
            position: relative;
            box-shadow: 0 0 40px rgba(0, 120, 140, 0.4);
            border-radius: 10px;
            overflow: hidden;
            border: 4px solid var(--hornets-silver);
        }

        canvas {
            background: white;
            display: block;
            cursor: crosshair;
        }

        input[type="text"] {
            padding: 10px;
            background: #0d1117;
            border: 1px solid var(--border);
            color: white;
            border-radius: 4px;
        }

        .action-btns { margin-top: auto; display: flex; flex-direction: column; gap: 8px; }
        .save-btn { background: var(--hornets-teal); color: white; padding: 15px; font-size: 16px; }
        .undo-btn { background: var(--hornets-purple); }
    </style>
</head>
<body>

    <aside>
        <h1>Buzz City Playbook</h1>

        <details open>
            <summary>🎨 Colors & History</summary>
            <div class="section-content">
                <input type="color" id="colorPicker" value="#00788C" style="width:100%; height:40px; cursor:pointer;">
                <span style="font-size: 11px; color: #8b949e;">RECENT COLORS (CLICK TO SELECT):</span>
                <div id="colorHistory"></div>
            </div>
        </details>

        <details>
            <summary>🖌️ Basic Tools</summary>
            <div class="section-content">
                <div class="grid">
                    <button class="tool active" data-tool="draw">Free Draw</button>
                    <button class="tool" data-tool="dot">Place Dot</button>
                </div>
                <input type="text" id="textInput" placeholder="Label (PG, SG...)">
                <button class="tool" data-tool="text">Add Text</button>
            </div>
        </details>

        <details>
            <summary>📐 Shapes</summary>
            <div class="section-content">
                <div class="grid">
                    <button class="tool" data-tool="circle">Circle</button>
                    <button class="tool" data-tool="square">Square</button>
                    <button class="tool" data-tool="star">Star</button>
                    <button class="tool" data-tool="heart">Heart</button>
                    <button class="tool" data-tool="x-mark">X Mark</button>
                    <button class="tool" data-tool="arrow">Arrow</button>
                </div>
            </div>
        </details>

        <div class="action-btns">
            <button id="undoBtn" class="undo-btn">↩ Undo Last Action</button>
            <button id="clearBtn" style="background: #da3633;">🗑 Clear Court</button>
            <hr style="border:0; border-top:1px solid var(--border); margin: 5px 0;">
            <input type="text" id="filenameInput" placeholder="Save file as...">
            <button id="saveBtn" class="save-btn">💾 DOWNLOAD AS .PNG</button>
        </div>
    </aside>

    <main>
        <div class="canvas-wrapper">
            <canvas id="courtCanvas" width="900" height="600"></canvas>
        </div>
    </main>

    <script>
        const canvas = document.getElementById('courtCanvas');
        const ctx = canvas.getContext('2d');
        const colorPicker = document.getElementById('colorPicker');
        const colorHistoryContainer = document.getElementById('colorHistory');
        const textInput = document.getElementById('textInput');
        
        let isDrawing = false;
        let currentTool = 'draw';
        let startX, startY;
        let history = [];
        let usedColors = new Set();

        const bg = new Image();
        bg.src = 'assets/background.png';
        bg.onload = () => { resetCanvas(); saveState(); };

        function resetCanvas() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.drawImage(bg, 0, 0, canvas.width, canvas.height);
        }

        // --- HISTORY & COLOR LOGIC ---
        function saveState() {
            if (history.length > 30) history.shift();
            history.push(canvas.toDataURL());
            addColorToHistory(colorPicker.value);
        }

        function addColorToHistory(color) {
            if (!usedColors.has(color.toUpperCase())) {
                usedColors.add(color.toUpperCase());
                const swatch = document.createElement('div');
                swatch.className = 'swatch';
                swatch.style.backgroundColor = color;
                swatch.onclick = () => colorPicker.value = color;
                colorHistoryContainer.prepend(swatch);
            }
        }

        document.getElementById('undoBtn').onclick = () => {
            if (history.length > 1) {
                history.pop();
                let img = new Image();
                img.src = history[history.length - 1];
                img.onload = () => {
                    ctx.clearRect(0, 0, canvas.width, canvas.height);
                    ctx.drawImage(img, 0, 0);
                };
            }
        };

        // --- TOOL SELECTION ---
        document.querySelectorAll('.tool').forEach(btn => {
            btn.onclick = () => {
                document.querySelectorAll('.tool').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                currentTool = btn.dataset.tool;
            };
        });

        // --- DRAWING LOGIC ---
        canvas.onmousedown = (e) => {
            const pos = getMousePos(e);
            startX = pos.x; startY = pos.y;
            isDrawing = true;
            if (currentTool === 'draw') {
                ctx.beginPath();
                ctx.moveTo(startX, startY);
            } else if (currentTool === 'dot') {
                drawDot(startX, startY);
                saveState();
                isDrawing = false;
            } else if (currentTool === 'text') {
                drawText(startX, startY);
                saveState();
                isDrawing = false;
            }
        };

        canvas.onmousemove = (e) => {
            if (!isDrawing || currentTool !== 'draw') return;
            const pos = getMousePos(e);
            ctx.lineTo(pos.x, pos.y);
            ctx.strokeStyle = colorPicker.value;
            ctx.lineWidth = 4;
            ctx.lineCap = 'round';
            ctx.stroke();
        };

        canvas.onmouseup = (e) => {
            if (!isDrawing) return;
            const pos = getMousePos(e);
            ctx.fillStyle = ctx.strokeStyle = colorPicker.value;
            ctx.lineWidth = 3;

            if (currentTool === 'circle') drawCircle(startX, startY, pos.x, pos.y);
            if (currentTool === 'square') drawSquare(startX, startY, pos.x, pos.y);
            if (currentTool === 'star') drawStar(startX, startY, pos.x, pos.y);
            if (currentTool === 'heart') drawHeart(startX, startY, pos.x, pos.y);
            if (currentTool === 'x-mark') drawX(startX, startY, pos.x, pos.y);
            if (currentTool === 'arrow') drawArrow(startX, startY, pos.x, pos.y);

            isDrawing = false;
            saveState();
        };

        // --- SHAPE FUNCTIONS ---
        function drawDot(x, y) {
            ctx.beginPath(); ctx.arc(x, y, 8, 0, Math.PI * 2);
            ctx.fillStyle = colorPicker.value; ctx.fill();
        }

        function drawText(x, y) {
            ctx.fillStyle = colorPicker.value;
            ctx.font = "bold 24px Arial"; ctx.textAlign = "center";
            ctx.fillText(textInput.value || "P", x, y);
        }

        function drawSquare(x1, y1, x2, y2) {
            ctx.strokeRect(x1, y1, x2 - x1, y2 - y1);
        }

        function drawCircle(x1, y1, x2, y2) {
            let r = Math.sqrt((x2-x1)**2 + (y2-y1)**2);
            ctx.beginPath(); ctx.arc(x1, y1, r, 0, Math.PI*2); ctx.stroke();
        }

        function drawStar(x, y, x2, y2) {
            let r = Math.sqrt((x2-x)**2 + (y2-y)**2);
            ctx.beginPath();
            for(let i=0; i<5; i++) {
                ctx.lineTo(Math.cos((18+i*72)/180*Math.PI)*r + x, -Math.sin((18+i*72)/180*Math.PI)*r + y);
                ctx.lineTo(Math.cos((54+i*72)/180*Math.PI)*(r/2) + x, -Math.sin((54+i*72)/180*Math.PI)*(r/2) + y);
            }
            ctx.closePath(); ctx.stroke();
        }

        function drawHeart(x, y, x2, y2) {
            let w = (x2 - x) * 2;
            ctx.beginPath();
            ctx.moveTo(x, y + w/4);
            ctx.quadraticCurveTo(x, y, x - w/4, y);
            ctx.quadraticCurveTo(x - w/2, y, x - w/2, y + w/4);
            ctx.quadraticCurveTo(x - w/2, y + w/2, x, y + w * 0.75);
            ctx.quadraticCurveTo(x + w/2, y + w/2, x + w/2, y + w/4);
            ctx.quadraticCurveTo(x + w/2, y, x + w/4, y);
            ctx.quadraticCurveTo(x, y, x, y + w/4);
            ctx.stroke();
        }

        function drawX(x, y, x2, y2) {
            let size = Math.abs(x2 - x);
            ctx.beginPath();
            ctx.moveTo(x - size, y - size); ctx.lineTo(x + size, y + size);
            ctx.moveTo(x + size, y - size); ctx.lineTo(x - size, y + size);
            ctx.stroke();
        }

        function drawArrow(x1, y1, x2, y2) {
            const head = 15; const angle = Math.atan2(y2-y1, x2-x1);
            ctx.beginPath(); ctx.moveTo(x1, y1); ctx.lineTo(x2, y2);
            ctx.lineTo(x2-head*Math.cos(angle-Math.PI/6), y2-head*Math.sin(angle-Math.PI/6));
            ctx.moveTo(x2, y2);
            ctx.lineTo(x2-head*Math.cos(angle+Math.PI/6), y2-head*Math.sin(angle+Math.PI/6));
            ctx.stroke();
        }

        function getMousePos(e) {
            const rect = canvas.getBoundingClientRect();
            return {
                x: (e.clientX - rect.left) * (canvas.width / rect.width),
                y: (e.clientY - rect.top) * (canvas.height / rect.height)
            };
        }

        document.getElementById('clearBtn').onclick = () => { if(confirm("Wipe everything?")) { resetCanvas(); saveState(); } };

        document.getElementById('saveBtn').onclick = () => {
            const link = document.createElement('a');
            link.download = (document.getElementById('filenameInput').value || 'hornets-play') + '.png';
            link.href = canvas.toDataURL(); link.click();
        };
    </script>
</body>
</html>
