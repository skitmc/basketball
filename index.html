<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SkitMC Basketball Playbook</title>
    <style>
        /* --- CSS STYLING --- */
        body { 
            font-family: 'Arial', sans-serif; 
            background-color: #121212; 
            color: white; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            margin: 0; 
            padding: 20px;
        }

        h1 { margin-bottom: 10px; color: #ff6600; }

        .controls-container {
            background: #222;
            padding: 20px;
            border-radius: 12px;
            border: 1px solid #444;
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
            justify-content: center;
            margin-bottom: 20px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }

        .control-group {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 0 10px;
            border-right: 1px solid #444;
        }

        .control-group:last-child { border-right: none; }

        canvas {
            background-color: #fff;
            border: 5px solid #ff6600;
            border-radius: 8px;
            cursor: crosshair;
            box-shadow: 0 0 20px rgba(255, 102, 0, 0.2);
        }

        button {
            padding: 10px 16px;
            border: none;
            border-radius: 6px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s;
        }

        button:active { transform: scale(0.95); }

        .btn-draw { background: #4CAF50; color: white; }
        .btn-text { background: #9c27b0; color: white; }
        .btn-clear { background: #f44336; color: white; }
        .btn-save { background: #2196F3; color: white; }
        
        input[type="text"] {
            padding: 10px;
            border-radius: 6px;
            border: 1px solid #444;
            background: #333;
            color: white;
        }

        input[type="color"] {
            width: 40px;
            height: 40px;
            border: none;
            cursor: pointer;
            background: none;
        }

        .active-tool {
            outline: 3px solid white;
            box-shadow: 0 0 10px white;
        }
    </style>
</head>
<body>

    <h1>🏀 skitmc/basketball</h1>

    <div class="controls-container">
        <div class="control-group">
            <input type="color" id="colorPicker" value="#ff0000">
            <button id="drawBtn" class="btn-draw active-tool">Draw Lines</button>
        </div>

        <div class="control-group">
            <input type="text" id="textInput" placeholder="Add text (e.g. PG)">
            <button id="textBtn" class="btn-text">Add Text</button>
        </div>

        <div class="control-group">
            <input type="text" id="filenameInput" placeholder="Name your play...">
            <button id="saveBtn" class="btn-save">Save as .PNG</button>
        </div>

        <div class="control-group">
            <button id="clearBtn" class="btn-clear">Clear Board</button>
        </div>
    </div>

    <canvas id="courtCanvas" width="800" height="500"></canvas>

    <script>
        /* --- JAVASCRIPT LOGIC --- */
        const canvas = document.getElementById('courtCanvas');
        const ctx = canvas.getContext('2d');
        const colorPicker = document.getElementById('colorPicker');
        const textInput = document.getElementById('textInput');
        const filenameInput = document.getElementById('filenameInput');
        
        const drawBtn = document.getElementById('drawBtn');
        const textBtn = document.getElementById('textBtn');
        const clearBtn = document.getElementById('clearBtn');
        const saveBtn = document.getElementById('saveBtn');

        let isDrawing = false;
        let currentTool = 'draw';

        // 1. Load the background image
        const bg = new Image();
        bg.src = 'assets/background.png';
        
        bg.onload = () => {
            resetCanvas();
        };

        function resetCanvas() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.drawImage(bg, 0, 0, canvas.width, canvas.height);
        }

        // 2. Tool Switching Logic
        drawBtn.onclick = () => {
            currentTool = 'draw';
            drawBtn.classList.add('active-tool');
            textBtn.classList.remove('active-tool');
        };

        textBtn.onclick = () => {
            currentTool = 'text';
            textBtn.classList.add('active-tool');
            drawBtn.classList.remove('active-tool');
        };

        clearBtn.onclick = () => {
            if(confirm("Clear the whole court?")) {
                resetCanvas();
            }
        };

        // 3. Mouse Interaction
        canvas.onmousedown = (e) => {
            const rect = canvas.getBoundingClientRect();
            const x = e.clientX - rect.left;
            const y = e.clientY - rect.top;

            if (currentTool === 'draw') {
                isDrawing = true;
                ctx.beginPath();
                ctx.moveTo(x, y);
                ctx.strokeStyle = colorPicker.value;
                ctx.lineWidth = 4;
                ctx.lineCap = 'round';
            } else if (currentTool === 'text') {
                const txt = textInput.value.trim();
                if (txt !== "") {
                    ctx.fillStyle = colorPicker.value;
                    ctx.font = "bold 22px Arial";
                    ctx.fillText(txt, x, y);
                }
            }
        };

        canvas.onmousemove = (e) => {
            if (!isDrawing || currentTool !== 'draw') return;
            const rect = canvas.getBoundingClientRect();
            const x = e.clientX - rect.left;
            const y = e.clientY - rect.top;

            ctx.lineTo(x, y);
            ctx.stroke();
        };

        canvas.onmouseup = () => isDrawing = false;
        canvas.onmouseout = () => isDrawing = false;

        // 4. Save Logic
        saveBtn.onclick = () => {
            const name = filenameInput.value.trim() || "basketball-play";
            const link = document.createElement('a');
            link.download = `${name}.png`;
            link.href = canvas.toDataURL("image/png");
            link.click();
        };
    </script>
</body>
</html>
