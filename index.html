<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BasketBall PlayBook</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/fabric.js/5.3.1/fabric.min.js"></script>
    <style>
        :root {
            --teal: #00788C;
            --purple: #1D1160;
            --dark: #0b0e14;
            --sidebar-bg: #161b22;
            --panel: #21262d;
            --border: #30363d;
            --text: #f0f6fc;
        }

        body {
            font-family: 'Inter', -apple-system, sans-serif;
            background-color: var(--dark);
            color: var(--text);
            margin: 0;
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        /* --- SIDEBAR --- */
        aside {
            width: 340px;
            background: var(--sidebar-bg);
            border-right: 2px solid var(--teal);
            display: flex;
            flex-direction: column;
            z-index: 100;
            box-shadow: 10px 0 30px rgba(0,0,0,0.5);
        }

        .sidebar-header {
            padding: 25px;
            text-align: center;
            background: linear-gradient(to bottom, var(--purple), transparent);
        }

        h1 { 
            font-size: 1.4rem; 
            color: var(--teal); 
            text-transform: uppercase; 
            letter-spacing: 3px; 
            margin: 0;
            font-weight: 800;
        }

        .scroll-area { flex: 1; overflow-y: auto; padding: 15px; }

        details {
            background: var(--panel);
            border: 1px solid var(--border);
            border-radius: 12px;
            margin-bottom: 12px;
            overflow: hidden;
        }

        summary { 
            padding: 14px; 
            font-weight: 700; 
            cursor: pointer; 
            color: var(--teal); 
            list-style: none; 
            transition: background 0.2s;
        }
        
        details[open] summary { background: var(--purple); color: white; }

        .content { padding: 15px; display: flex; flex-direction: column; gap: 12px; }

        /* --- TOOLS & BUTTONS --- */
        .tool-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }

        button {
            padding: 12px;
            border-radius: 8px;
            border: 1px solid var(--border);
            background: #30363d;
            color: white;
            font-weight: 600;
            cursor: pointer;
            transition: 0.2s;
            font-size: 13px;
        }

        button:hover { border-color: var(--teal); background: #3c444d; }
        button.active { background: var(--teal); border-color: white; box-shadow: 0 0 15px rgba(0, 120, 140, 0.4); }
        
        #colorHistory { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 10px; }
        .swatch { width: 28px; height: 28px; border-radius: 6px; border: 2px solid white; cursor: pointer; transition: 0.2s; }
        .swatch:hover { transform: scale(1.1); }

        /* --- CANVAS AREA --- */
        main {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            position: relative;
            background-image: radial-gradient(circle at 2px 2px, rgba(255,255,255,0.05) 1px, transparent 0);
            background-size: 40px 40px;
        }

        .canvas-card {
            background: white;
            padding: 8px;
            border-radius: 16px;
            border: 4px solid var(--teal);
            box-shadow: 0 25px 50px rgba(0,0,0,0.7);
        }

        /* --- TOP HUD --- */
        .hud {
            position: absolute;
            top: 20px;
            display: flex;
            gap: 15px;
            z-index: 10;
        }

        .hud-btn {
            background: rgba(22, 27, 34, 0.9);
            backdrop-filter: blur(10px);
            border: 1px solid var(--border);
            padding: 10px 20px;
            border-radius: 30px;
            color: white;
            font-weight: bold;
            cursor: pointer;
            font-size: 12px;
        }

        .hud-btn:hover { background: var(--teal); border-color: white; }

        input[type="text"], input[type="color"] {
            padding: 12px;
            background: #0d1117;
            border: 1px solid var(--border);
            color: white;
            border-radius: 8px;
            outline: none;
        }
    </style>
</head>
<body>

    <div class="hud">
        <button onclick="undo()" class="hud-btn">↩ UNDO</button>
        <button onclick="redo()" class="hud-btn">↪ REDO</button>
        <button onclick="deleteSelected()" class="hud-btn" style="color: #ff4d4d;">🗑 DELETE</button>
        <button onclick="clearCanvas()" class="hud-btn">🧹 CLEAR ALL</button>
        <button onclick="document.getElementById('fileUpload').click()" class="hud-btn" style="color: var(--teal);">📤 UPLOAD IMAGE</button>
    </div>

    <input type="file" id="fileUpload" style="display:none;" accept="image/*">

    <aside>
        <div class="sidebar-header">
            <h1>BasketBall PlayBook</h1>
        </div>
        
        <div class="scroll-area">
            <details open>
                <summary>🎨 PALETTE & HISTORY</summary>
                <div class="content">
                    <input type="color" id="colorPicker" value="#00788C" style="width:100%; height:50px; cursor:pointer; background:none; border:none;">
                    <div id="colorHistory"></div>
                </div>
            </details>

            <details open>
                <summary>🖱️ CONTROL MODE</summary>
                <div class="content">
                    <button class="tool active" data-tool="select" style="width:100%">SELECT / MOVE OBJECTS</button>
                    <p style="font-size: 11px; color: #8b949e; margin: 0;">Click a shape to move, resize, rotate, or change its color.</p>
                </div>
            </details>

            <details open>
                <summary>📐 TACTICAL SHAPES</summary>
                <div class="content">
                    <div class="tool-grid">
                        <button class="tool" data-tool="dot">PLAYER DOT</button>
                        <button class="tool" data-tool="circle">CIRCLE</button>
                        <button class="tool" data-tool="square">SQUARE</button>
                        <button class="tool" data-tool="arrow">ARROW</button>
                        <button class="tool" data-tool="x-mark">X MARK</button>
                        <button class="tool" data-tool="star">STAR</button>
                        <button class="tool" data-tool="heart">HEART</button>
                    </div>
                </div>
            </details>

            <details>
                <summary>📝 ANNOTATIONS</summary>
                <div class="content">
                    <input type="text" id="textInput" placeholder="Label (e.g. PG)">
                    <button class="tool" data-tool="text">PLACE TEXT</button>
                </div>
            </details>

            <div style="margin-top: 20px;">
                <input type="text" id="filenameInput" placeholder="Play Name..." style="width:100%; margin-bottom:10px;">
                <button onclick="exportPNG()" style="width:100%; background: var(--teal); padding:15px; font-size:16px;">💾 DOWNLOAD PLAY</button>
            </div>
        </div>
    </aside>

    <main>
        <div class="canvas-card">
            <canvas id="playCanvas" width="900" height="600"></canvas>
        </div>
    </main>

    <script>
        // --- INITIALIZE ENGINE ---
        const canvas = new fabric.Canvas('playCanvas', {
            preserveObjectStacking: true,
            stopContextMenu: true
        });

        const colorPicker = document.getElementById('colorPicker');
        const historyContainer = document.getElementById('colorHistory');
        const textInput = document.getElementById('textInput');
        let currentTool = 'select';
        let usedColors = new Set();

        // --- UNDO/REDO SYSTEM ---
        let history = [];
        let index = -1;

        function updateState() {
            if (index < history.length - 1) {
                history = history.slice(0, index + 1);
            }
            history.push(JSON.stringify(canvas));
            index = history.length - 1;
        }

        function undo() {
            if (index > 0) {
                index--;
                canvas.loadFromJSON(history[index], canvas.renderAll.bind(canvas));
            }
        }

        function redo() {
            if (index < history.length - 1) {
                index++;
                canvas.loadFromJSON(history[index], canvas.renderAll.bind(canvas));
            }
        }

        canvas.on('object:added', updateState);
        canvas.on('object:modified', updateState);
        canvas.on('object:removed', updateState);

        // --- BACKGROUND ---
        function setBackground(url) {
            fabric.Image.fromURL(url, function(img) {
                canvas.setBackgroundImage(img, canvas.renderAll.bind(canvas), {
                    scaleX: canvas.width / img.width,
                    scaleY: canvas.height / img.height
                });
                updateState();
            });
        }
        // Default court (replace 'assets/background.png' with your actual path)
        setBackground('assets/background.png');

        // --- TOOL SELECTION ---
        document.querySelectorAll('.tool').forEach(btn => {
            btn.onclick = () => {
                document.querySelectorAll('.tool').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                currentTool = btn.dataset.tool;
                
                canvas.selection = (currentTool === 'select');
                canvas.forEachObject(obj => obj.selectable = (currentTool === 'select'));
            };
        });

        // --- ADDING OBJECTS ---
        canvas.on('mouse:down', function(options) {
            if (currentTool === 'select') return;
            
            const pointer = canvas.getPointer(options.e);
            const color = colorPicker.value;
            let shape;

            switch(currentTool) {
                case 'dot':
                    shape = new fabric.Circle({ radius: 12, fill: color, left: pointer.x, top: pointer.y, originX: 'center', originY: 'center' });
                    break;
                case 'circle':
                    shape = new fabric.Circle({ radius: 40, fill: 'transparent', stroke: color, strokeWidth: 4, left: pointer.x, top: pointer.y, originX: 'center', originY: 'center' });
                    break;
                case 'square':
                    shape = new fabric.Rect({ width: 60, height: 60, fill: 'transparent', stroke: color, strokeWidth: 4, left: pointer.x, top: pointer.y, originX: 'center', originY: 'center' });
                    break;
                case 'x-mark':
                    shape = new fabric.Text('X', { fontSize: 45, fill: color, fontWeight: 'bold', left: pointer.x, top: pointer.y, originX: 'center', originY: 'center' });
                    break;
                case 'text':
                    shape = new fabric.Text(textInput.value || 'P1', { fontSize: 26, fill: color, fontWeight: 'bold', left: pointer.x, top: pointer.y, originX: 'center', originY: 'center' });
                    break;
                case 'star':
                    shape = new fabric.Path('M 0 -20 L 5 -7 L 19 -7 L 8 2 L 12 15 L 0 7 L -12 15 L -8 2 L -19 -7 L -5 -7 Z', { fill: color, left: pointer.x, top: pointer.y, scaleX: 2.2, scaleY: 2.2, originX: 'center', originY: 'center' });
                    break;
                case 'heart':
                    shape = new fabric.Path('M 0 10 C -10 -10 -20 0 -20 10 C -20 25 0 35 0 40 C 0 35 20 25 20 10 C 20 0 10 -10 0 10 Z', { fill: color, left: pointer.x, top: pointer.y, scaleX: 1.5, scaleY: 1.5, originX: 'center', originY: 'center', angle: 180 });
                    break;
                case 'arrow':
                    const line = new fabric.Line([0, 25, 0, -25], { stroke: color, strokeWidth: 5, originX: 'center', originY: 'center' });
                    const head = new fabric.Triangle({ width: 20, height: 20, fill: color, left: 0, top: -25, originX: 'center', originY: 'center' });
                    shape = new fabric.Group([line, head], { left: pointer.x, top: pointer.y, originX: 'center', originY: 'center' });
                    break;
            }

            if (shape) {
                canvas.add(shape);
                addColorHistory(color);
                document.querySelector('[data-tool="select"]').click(); // Auto-switch to select
            }
        });

        // --- COLOR & HISTORY ---
        function addColorHistory(color) {
            color = color.toUpperCase();
            if (!usedColors.has(color)) {
                usedColors.add(color);
                const sw = document.createElement('div');
                sw.className = 'swatch';
                sw.style.backgroundColor = color;
                sw.onclick = () => { colorPicker.value = color; changeActiveColor(); };
                historyContainer.prepend(sw);
            }
        }

        function changeActiveColor() {
            const active = canvas.getActiveObject();
            if (active) {
                if (active.type === 'group') {
                    active.forEachObject(o => o.set(o.stroke && o.stroke !== 'transparent' ? 'stroke' : 'fill', colorPicker.value));
                } else {
                    active.set(active.stroke && active.fill === 'transparent' ? 'stroke' : 'fill', colorPicker.value);
                }
                canvas.renderAll();
                updateState();
            }
        }
        colorPicker.oninput = changeActiveColor;

        // --- HUD ACTIONS ---
        function deleteSelected() {
            canvas.getActiveObjects().forEach(o => canvas.remove(o));
            canvas.discardActiveObject().renderAll();
        }

        function clearCanvas() {
            if(confirm("Wipe the entire playbook?")) {
                canvas.getObjects().forEach(o => { if(o !== canvas.backgroundImage) canvas.remove(o); });
                updateState();
            }
        }

        function exportPNG() {
            const link = document.createElement('a');
            link.download = (document.getElementById('filenameInput').value || 'BasketBallPlaybook') + '.png';
            link.href = canvas.toDataURL({ format: 'png', quality: 1 });
            link.click();
        }

        // --- FILE UPLOADER ---
        document.getElementById('fileUpload').onchange = (e) => {
            const reader = new FileReader();
            reader.onload = (f) => setBackground(f.target.result);
            reader.readAsDataURL(e.target.files[0]);
        };

        // --- KEYBOARD DELETE ---
        window.addEventListener('keydown', (e) => {
            if ((e.key === "Delete" || e.key === "Backspace") && document.activeElement.tagName !== 'INPUT') {
                deleteSelected();
            }
        });
    </script>
</body>
</html>
