<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BasketBall PlayBook</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/fabric.js/5.3.1/fabric.min.js"></script>
    <style>
        :root {
            --teal: #00788C;
            --purple: #1D1160;
            --dark: #0b0e14;
            --sidebar-bg: #161b22;
            --panel: #21262d;
            --border: #30363d;
            --text: #f0f6fc;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--dark);
            color: var(--text);
            margin: 0;
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        /* --- SIDEBAR --- */
        aside {
            width: 340px;
            background: var(--sidebar-bg);
            border-right: 2px solid var(--teal);
            display: flex;
            flex-direction: column;
            z-index: 100;
        }

        .sidebar-header {
            padding: 25px;
            text-align: center;
            background: linear-gradient(to bottom, var(--purple), transparent);
        }

        /* --- THE BLINKING TITLE --- */
        @keyframes neonBlink {
            0%, 100% { opacity: 1; text-shadow: 0 0 10px var(--teal), 0 0 20px var(--teal); }
            50% { opacity: 0.2; text-shadow: none; }
        }

        h1 { 
            font-size: 1.5rem; 
            color: var(--teal); 
            text-transform: uppercase; 
            letter-spacing: 2px; 
            margin: 0;
            font-weight: 900;
            animation: neonBlink 1.5s ease-in-out infinite;
        }

        .scroll-area { flex: 1; overflow-y: auto; padding: 15px; }

        details {
            background: var(--panel);
            border: 1px solid var(--border);
            border-radius: 12px;
            margin-bottom: 12px;
        }

        summary { padding: 14px; font-weight: 700; cursor: pointer; color: var(--teal); list-style: none; }
        details[open] summary { background: var(--purple); color: white; }

        .content { padding: 15px; display: flex; flex-direction: column; gap: 10px; }

        /* --- BUTTONS --- */
        .tool-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }

        button {
            padding: 12px;
            border-radius: 8px;
            border: 1px solid var(--border);
            background: #30363d;
            color: white;
            font-weight: 600;
            cursor: pointer;
            transition: 0.2s;
        }

        button:hover { border-color: var(--teal); background: #3c444d; }
        button.active { background: var(--teal); border-color: white; box-shadow: 0 0 10px var(--teal); }
        
        #colorHistory { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 10px; }
        .swatch { width: 28px; height: 28px; border-radius: 6px; border: 1px solid white; cursor: pointer; }

        /* --- MAIN CANVAS --- */
        main {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        .canvas-card {
            background: white;
            padding: 8px;
            border-radius: 16px;
            border: 4px solid var(--teal);
            box-shadow: 0 20px 40px rgba(0,0,0,0.6);
        }

        /* --- TOP HUD --- */
        .hud {
            position: absolute;
            top: 20px;
            display: flex;
            gap: 12px;
            z-index: 50;
        }

        .hud-btn {
            background: rgba(22, 27, 34, 0.9);
            border: 1px solid var(--border);
            padding: 10px 18px;
            border-radius: 25px;
            color: white;
            font-weight: bold;
            cursor: pointer;
            font-size: 12px;
        }

        .hud-btn:hover { background: var(--teal); }

        input[type="text"] {
            padding: 10px;
            background: #0d1117;
            border: 1px solid var(--border);
            color: white;
            border-radius: 6px;
        }
    </style>
</head>
<body>

    <div class="hud">
        <button id="undoBtn" class="hud-btn">↩ UNDO</button>
        <button id="redoBtn" class="hud-btn">↪ REDO</button>
        <button onclick="deleteSelected()" class="hud-btn" style="color: #ff4d4d;">🗑 DELETE</button>
        <button onclick="clearCanvas()" class="hud-btn">🧹 CLEAR ALL</button>
        <button onclick="document.getElementById('fileUpload').click()" class="hud-btn" style="color: var(--teal);">📤 UPLOAD COURT</button>
    </div>

    <input type="file" id="fileUpload" style="display:none;" accept="image/*">

    <aside>
        <div class="sidebar-header">
            <h1>BasketBall PlayBook</h1>
        </div>
        
        <div class="scroll-area">
            <details open>
                <summary>🎨 COLOR & HISTORY</summary>
                <div class="content">
                    <input type="color" id="colorPicker" value="#00788C" style="width:100%; height:45px; cursor:pointer; background:none; border:none;">
                    <div id="colorHistory"></div>
                </div>
            </details>

            <details open>
                <summary>🕹️ MODE CONTROL</summary>
                <div class="content">
                    <button class="tool" data-tool="select" style="width:100%">SELECT / MOVE MODE</button>
                    <p style="font-size: 11px; color: #8b949e; text-align:center;">Switch here to move objects.</p>
                </div>
            </details>

            <details open>
                <summary>📐 TACTICAL SHAPES</summary>
                <div class="content">
                    <div class="tool-grid">
                        <button class="tool active" data-tool="dot">PLAYER DOT</button>
                        <button class="tool" data-tool="circle">CIRCLE</button>
                        <button class="tool" data-tool="square">SQUARE</button>
                        <button class="tool" data-tool="arrow">ARROW</button>
                        <button class="tool" data-tool="x-mark">X MARK</button>
                        <button class="tool" data-tool="star">STAR</button>
                        <button class="tool" data-tool="heart">HEART</button>
                    </div>
                </div>
            </details>

            <details>
                <summary>📝 LABELS</summary>
                <div class="content">
                    <input type="text" id="textInput" placeholder="Enter Label...">
                    <button class="tool" data-tool="text">PLACE TEXT</button>
                </div>
            </details>

            <div style="margin-top: 20px;">
                <input type="text" id="filenameInput" placeholder="Save as..." style="width:100%; margin-bottom:10px;">
                <button onclick="exportPNG()" style="width:100%; background: var(--teal); padding:15px; font-size:16px;">💾 DOWNLOAD PNG</button>
            </div>
        </div>
    </aside>

    <main>
        <div class="canvas-card">
            <canvas id="c" width="900" height="600"></canvas>
        </div>
    </main>

    <script>
        const canvas = new fabric.Canvas('c', { preserveObjectStacking: true });
        const colorPicker = document.getElementById('colorPicker');
        const historyContainer = document.getElementById('colorHistory');
        const textInput = document.getElementById('textInput');
        
        let currentTool = 'dot';
        let usedColors = new Set();

        // --- STABLE UNDO/REDO SYSTEM ---
        let stateHistory = [];
        let currentStateIndex = -1;
        let isPushed = false;

        function saveState() {
            if (isPushed) return;
            const json = JSON.stringify(canvas);
            if (currentStateIndex < stateHistory.length - 1) {
                stateHistory = stateHistory.slice(0, currentStateIndex + 1);
            }
            stateHistory.push(json);
            currentStateIndex = stateHistory.length - 1;
        }

        function undo() {
            if (currentStateIndex <= 0) return;
            isPushed = true;
            currentStateIndex--;
            canvas.loadFromJSON(stateHistory[currentStateIndex], () => {
                canvas.renderAll();
                isPushed = false;
            });
        }

        function redo() {
            if (currentStateIndex >= stateHistory.length - 1) return;
            isPushed = true;
            currentStateIndex++;
            canvas.loadFromJSON(stateHistory[currentStateIndex], () => {
                canvas.renderAll();
                isPushed = false;
            });
        }

        document.getElementById('undoBtn').onclick = undo;
        document.getElementById('redoBtn').onclick = redo;

        canvas.on('object:added', saveState);
        canvas.on('object:modified', saveState);
        canvas.on('object:removed', saveState);

        // --- BACKGROUND ---
        function setBg(url) {
            fabric.Image.fromURL(url, (img) => {
                canvas.setBackgroundImage(img, canvas.renderAll.bind(canvas), {
                    scaleX: canvas.width / img.width,
                    scaleY: canvas.height / img.height
                });
                setTimeout(saveState, 100);
            });
        }
        setBg('assets/background.png');

        // --- DRAWING ---
        canvas.on('mouse:down', (opt) => {
            if (currentTool === 'select') return;
            const ptr = canvas.getPointer(opt.e);
            const color = colorPicker.value;
            let obj;

            switch(currentTool) {
                case 'dot': obj = new fabric.Circle({ radius: 12, fill: color, left: ptr.x, top: ptr.y, originX:'center', originY:'center' }); break;
                case 'circle': obj = new fabric.Circle({ radius: 40, fill: 'transparent', stroke: color, strokeWidth: 4, left: ptr.x, top: ptr.y, originX:'center', originY:'center' }); break;
                case 'square': obj = new fabric.Rect({ width: 60, height: 60, fill: 'transparent', stroke: color, strokeWidth: 4, left: ptr.x, top: ptr.y, originX:'center', originY:'center' }); break;
                case 'x-mark': obj = new fabric.Text('X', { fontSize: 45, fill: color, fontWeight: 'bold', left: ptr.x, top: ptr.y, originX:'center', originY:'center' }); break;
                case 'text': obj = new fabric.Text(textInput.value || 'P', { fontSize: 26, fill: color, fontWeight: 'bold', left: ptr.x, top: ptr.y, originX:'center', originY:'center' }); break;
                case 'star': obj = new fabric.Path('M 0 -20 L 5 -7 L 19 -7 L 8 2 L 12 15 L 0 7 L -12 15 L -8 2 L -19 -7 L -5 -7 Z', { fill: color, left: ptr.x, top: ptr.y, scaleX: 2.2, scaleY: 2.2, originX:'center', originY:'center' }); break;
                case 'heart': obj = new fabric.Path('M 0 10 C -10 -10 -20 0 -20 10 C -20 25 0 35 0 40 C 0 35 20 25 20 10 C 20 0 10 -10 0 10 Z', { fill: color, left: ptr.x, top: ptr.y, scaleX: 1.5, scaleY: 1.5, originX:'center', originY:'center', angle: 180 }); break;
                case 'arrow':
                    const line = new fabric.Line([0, 25, 0, -25], { stroke: color, strokeWidth: 5, originX:'center', originY:'center' });
                    const head = new fabric.Triangle({ width: 20, height: 20, fill: color, left: 0, top: -25, originX:'center', originY:'center' });
                    obj = new fabric.Group([line, head], { left: ptr.x, top: ptr.y, originX:'center', originY:'center' });
                    break;
            }

            if (obj) {
                obj.selectable = false;
                obj.evented = false;
                canvas.add(obj);
                if (!usedColors.has(color.toUpperCase())) {
                    usedColors.add(color.toUpperCase());
                    const sw = document.createElement('div');
                    sw.className = 'swatch';
                    sw.style.backgroundColor = color;
                    sw.onclick = () => { colorPicker.value = color; };
                    historyContainer.prepend(sw);
                }
            }
        });

        // --- UI LOGIC ---
        document.querySelectorAll('.tool').forEach(btn => {
            btn.onclick = () => {
                document.querySelectorAll('.tool').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                currentTool = btn.dataset.tool;
                canvas.selection = (currentTool === 'select');
                canvas.forEachObject(o => {
                    o.selectable = (currentTool === 'select');
                    o.evented = (currentTool === 'select');
                });
            };
        });

        function deleteSelected() {
            canvas.getActiveObjects().forEach(o => canvas.remove(o));
            canvas.discardActiveObject().renderAll();
        }

        function clearCanvas() {
            if(confirm("Wipe everything?")) {
                canvas.getObjects().forEach(o => { if(o !== canvas.backgroundImage) canvas.remove(o); });
                saveState();
            }
        }

        function exportPNG() {
            const link = document.createElement('a');
            link.download = (document.getElementById('filenameInput').value || 'Playbook') + '.png';
            link.href = canvas.toDataURL({ format: 'png', quality: 1 });
            link.click();
        }

        document.getElementById('fileUpload').onchange = (e) => {
            const reader = new FileReader();
            reader.onload = (f) => setBg(f.target.result);
            reader.readAsDataURL(e.target.files[0]);
        };

        window.addEventListener('keydown', (e) => {
            if ((e.key === "Delete" || e.key === "Backspace") && document.activeElement.tagName !== 'INPUT') deleteSelected();
        });
    </script>
</body>
</html>
